<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskBoard — Week 4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">⬡</span>
        <span class="brand-name">TaskBoard</span>
        <span class="brand-tag">Layered · Week 4</span>
      </div>
      <div class="header-stats" id="headerStats">
        <span class="stat-chip" id="statTotal"><b>0</b> total</span>
        <span class="stat-chip todo"><b id="statTodo">0</b> todo</span>
        <span class="stat-chip wip"><b id="statWip">0</b> in progress</span>
        <span class="stat-chip done"><b id="statDone">0</b> done</span>
      </div>
      <button class="btn-theme" id="btnTheme" title="Toggle dark mode">🌙</button>
      <button class="btn-new" id="btnNewTask">+ New Task</button>
    </div>
  </header>

  <!-- ── Toolbar ──────────────────────────────────────────── -->
  <div class="toolbar">
    <div class="toolbar-inner">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="Search tasks…" />
      </div>
      <div class="filter-group">
        <label class="filter-label">Status</label>
        <div class="seg-control" id="filterStatus">
          <button class="seg active" data-value="">All</button>
          <button class="seg" data-value="TODO">Todo</button>
          <button class="seg" data-value="IN_PROGRESS">In Progress</button>
          <button class="seg" data-value="DONE">Done</button>
        </div>
      </div>
      <div class="filter-group">
        <label class="filter-label">Priority</label>
        <div class="seg-control" id="filterPriority">
          <button class="seg active" data-value="">All</button>
          <button class="seg" data-value="HIGH">High</button>
          <button class="seg" data-value="MEDIUM">Med</button>
          <button class="seg" data-value="LOW">Low</button>
        </div>
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="viewBoard" title="Board view">⊞</button>
        <button class="view-btn" id="viewList"  title="List view">☰</button>
      </div>
    </div>
  </div>

  <!-- ── Board / List ─────────────────────────────────────── -->
  <main class="main" id="mainContent">

    <!-- Board View -->
    <div class="board" id="boardView">
      <div class="column" id="col-todo">
        <div class="col-header">
          <span class="col-dot todo"></span>
          <span class="col-title">TODO</span>
          <span class="col-count" id="count-todo">0</span>
        </div>
        <div class="col-body" id="tasks-todo"></div>
      </div>
      <div class="column" id="col-inprogress">
        <div class="col-header">
          <span class="col-dot wip"></span>
          <span class="col-title">IN PROGRESS</span>
          <span class="col-count" id="count-inprogress">0</span>
        </div>
        <div class="col-body" id="tasks-inprogress"></div>
      </div>
      <div class="column" id="col-done">
        <div class="col-header">
          <span class="col-dot done"></span>
          <span class="col-title">DONE</span>
          <span class="col-count" id="count-done">0</span>
        </div>
        <div class="col-body" id="tasks-done"></div>
      </div>
    </div>

    <!-- List View -->
    <div class="list-view hidden" id="listView">
      <table class="task-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="taskTableBody"></tbody>
      </table>
    </div>

    <!-- Empty state -->
    <div class="empty-state hidden" id="emptyState">
      <div class="empty-icon">📋</div>
      <p class="empty-title">No tasks found</p>
      <p class="empty-sub">Create a task or adjust your filters</p>
    </div>

  </main>

  <!-- ── Modal ────────────────────────────────────────────── -->
  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">New Task</h2>
        <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="taskId" />

        <div class="field">
          <label class="field-label" for="taskTitle">Title <span class="req">*</span></label>
          <input type="text" id="taskTitle" class="field-input" placeholder="What needs to be done?" maxlength="120" />
        </div>

        <div class="field">
          <label class="field-label" for="taskDescription">Description</label>
          <textarea id="taskDescription" class="field-input textarea" rows="3" placeholder="Optional details…" maxlength="500"></textarea>
        </div>

        <div class="field-row">
          <div class="field">
            <label class="field-label" for="taskStatus">Status</label>
            <select id="taskStatus" class="field-input select">
              <option value="TODO">TODO</option>
              <option value="IN_PROGRESS">IN PROGRESS</option>
              <option value="DONE">DONE</option>
            </select>
          </div>
          <div class="field">
            <label class="field-label" for="taskPriority">Priority</label>
            <select id="taskPriority" class="field-input select">
              <option value="LOW">Low</option>
              <option value="MEDIUM" selected>Medium</option>
              <option value="HIGH">High</option>
            </select>
          </div>
        </div>

        <p class="field-error hidden" id="formError"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btnCancel">Cancel</button>
        <button class="btn btn-primary" id="btnSave">Save Task</button>
      </div>
    </div>
  </div>

  <!-- ── Confirm Dialog ────────────────────────────────────── -->
  <div class="modal-backdrop hidden" id="confirmBackdrop">
    <div class="modal confirm-modal">
      <div class="modal-header">
        <h2 class="modal-title">Delete Task?</h2>
      </div>
      <div class="modal-body">
        <p class="confirm-text">This action cannot be undone.</p>
        <p class="confirm-task-name" id="confirmTaskName"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Cancel</button>
        <button class="btn btn-danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ─────────────────────────────────────────────── -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
